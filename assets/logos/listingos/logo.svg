<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" width="1080" height="720">
  <!--
    ListingOS logo — LAYERED source.
    Every animatable unit is a <g> with a stable id and a data-layer attribute.
    Do not flatten. The spec generator and the Remotion harness both key off these ids.
  -->
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="45%" stop-color="#2f5cff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bracketGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="thumbGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b6bff"/>
      <stop offset="100%" stop-color="#6d3aed"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0%" stop-color="#141a4d"/>
      <stop offset="100%" stop-color="#05071c"/>
    </radialGradient>
    <clipPath id="thumbClip">
      <rect x="536" y="212" width="90" height="68" rx="8"/>
    </clipPath>
  </defs>

  <g id="background" data-layer="background" data-role="backdrop">
    <rect x="0" y="0" width="1080" height="720" fill="url(#bgGlow)"/>
  </g>

  <g id="brackets" data-layer="brackets" data-role="scan-frame"
     fill="none" stroke="url(#bracketGradient)" stroke-width="15"
     stroke-linecap="round" stroke-linejoin="round">
    <path id="bracket-tl" data-corner="top-left"     d="M 420 205 L 420 176 Q 420 157 439 157 L 468 157"/>
    <path id="bracket-tr" data-corner="top-right"    d="M 620 157 L 649 157 Q 668 157 668 176 L 668 205"/>
    <path id="bracket-bl" data-corner="bottom-left"  d="M 420 385 L 420 414 Q 420 433 439 433 L 468 433"/>
    <path id="bracket-br" data-corner="bottom-right" d="M 620 433 L 649 433 Q 668 433 668 414 L 668 385"/>
  </g>

  <g id="l-mark" data-layer="l-mark" data-role="letterform">
    <path id="l-shape"
          fill="url(#brandGradient)"
          d="M 452 224 Q 452 200 476 200 L 486 200 Q 510 200 510 224 L 510 352 L 624 352 Q 648 352 648 376 L 648 386 Q 648 410 624 410 L 476 410 Q 452 410 452 386 Z"/>
  </g>

  <g id="card" data-layer="card" data-role="listing-card">
    <rect id="card-body" x="522" y="196" width="118" height="162" rx="14" fill="#ffffff"/>
    <g id="card-thumb" data-part="thumbnail">
      <rect x="536" y="212" width="90" height="68" rx="8" fill="url(#thumbGradient)"/>
      <g clip-path="url(#thumbClip)">
        <path id="thumb-mountain" fill="#ffffff"
              d="M 536 280 L 566 240 L 588 268 L 600 254 L 626 280 Z"/>
      </g>
      <circle id="thumb-sun" cx="602" cy="232" r="9" fill="#ffffff"/>
    </g>
    <g id="card-lines" data-part="text-lines" fill="#0f1535">
      <rect id="card-line-1" x="536" y="300" width="90" height="11" rx="5.5"/>
      <rect id="card-line-2" x="536" y="322" width="62" height="11" rx="5.5"/>
    </g>
  </g>

  <!--
    Wordmark is DATA, not baked layout. The Remotion harness re-lays this out with
    real text metrics so per-letter animation is possible; the <text> below exists
    only so the .svg previews correctly in a browser or Figma.
  -->
  <g id="wordmark" data-layer="wordmark" data-role="text"
     data-text="OS" data-accent-text="" data-accent-split="0"
     data-primary-fill="#ffffff" data-accent-fill="#7c5cff"
     data-font-family="Poppins, Montserrat, Inter, sans-serif"
     data-font-size="104" data-font-weight="700"
     data-center-x="540" data-baseline-y="556"
     font-family="Poppins, Montserrat, Inter, 'Helvetica Neue', Arial, sans-serif"
     font-size="104" font-weight="700">
    <text id="wordmark-primary" x="540" y="556" text-anchor="start"   fill="#ffffff">OS</text>
  </g>
</svg>
